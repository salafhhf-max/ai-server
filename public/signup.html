<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PromptBox AI - Sign Up</title>

<style>

body{
margin:0;
padding:0;
font-family:Arial;
background:#020617;
overflow:hidden;
color:white;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

.container{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
width:380px;
padding:40px;
background:#041c18;
border-radius:16px;
box-shadow:0 0 60px #10b981;
text-align:center;
}

h2{
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin-top:15px;
border-radius:8px;
border:1px solid #10b981;
background:#021b16;
color:white;
outline:none;
}

input:focus{
box-shadow:0 0 10px #10b981;
}

button{
width:100%;
padding:12px;
margin-top:20px;
border:none;
border-radius:8px;
cursor:pointer;
font-size:16px;
transition:0.3s;
}

.signup-btn{
background:#10b981;
color:white;
}

.signup-btn:hover{
transform:scale(1.05);
box-shadow:0 0 20px #10b981;
}

button:disabled{
opacity:0.5;
cursor:not-allowed;
}

.google-btn{
background:#ea4335;
color:white;
}

.google-btn:hover{
transform:scale(1.05);
box-shadow:0 0 20px #ea4335;
}

.or{
margin:20px 0;
opacity:0.6;
}

a{
color:#10b981;
text-decoration:none;
}

.error{
margin-top:10px;
color:#f87171;
font-size:14px;
min-height:18px;
}

</style>

</head>

<body>

<canvas id="stars"></canvas>

<div class="container">

<div class="box">

<h2>Create Account</h2>

<input id="name" placeholder="Name">
<input id="email" type="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<div class="error" id="error"></div>

<button id="signupBtn" class="signup-btn" onclick="signup()">Sign Up</button>

<div class="or">or</div>

<button class="google-btn" onclick="googleLogin()">Sign up with Google</button>

<p style="margin-top:20px;">
Already have an account?
<a href="login.html">Login</a>
</p>

</div>

</div>

<script>

/* star background */

const canvas=document.getElementById("stars");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let stars=[];

for(let i=0;i<200;i++){

stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*2,
speed:Math.random()*0.2
});

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="white";

stars.forEach(star=>{

ctx.beginPath();
ctx.arc(star.x,star.y,star.size,0,Math.PI*2);
ctx.fill();

star.y+=star.speed;

if(star.y>canvas.height){
star.y=0;
star.x=Math.random()*canvas.width;
}

});

requestAnimationFrame(draw);

}

draw();

window.addEventListener("resize",()=>{
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
});

</script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getAuth,
createUserWithEmailAndPassword,
GoogleAuthProvider,
signInWithPopup,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyAcvs9DevO3ezuIdlzkO_pZo1LiehaCLls",
authDomain: "promptbox-ai-6833b.firebaseapp.com",
projectId: "promptbox-ai-6833b",
storageBucket: "promptbox-ai-6833b.firebasestorage.app",
messagingSenderId: "745942779497",
appId: "1:745942779497:web:569e8a2edfaa76273904f8"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const errorBox=document.getElementById("error")
const signupBtn=document.getElementById("signupBtn")

/* redirect if already logged in */

onAuthStateChanged(auth,(user)=>{

if(user){
window.location.href="dashboard.html"
}

})

/* SIGNUP */

window.signup = async function(){

const name=document.getElementById("name").value.trim()
const email=document.getElementById("email").value.trim()
const password=document.getElementById("password").value.trim()

errorBox.innerText=""

if(!name || !email || !password){

errorBox.innerText="Please fill all fields"
return

}

if(password.length < 6){

errorBox.innerText="Password must be at least 6 characters"
return

}

signupBtn.disabled=true

try{

await createUserWithEmailAndPassword(auth,email,password)

window.location.href="dashboard.html"

}catch(error){

if(error.code==="auth/email-already-in-use"){

errorBox.innerText="Email already registered."

}else if(error.code==="auth/invalid-email"){

errorBox.innerText="Invalid email."

}else if(error.code==="auth/weak-password"){

errorBox.innerText="Weak password."

}else{

errorBox.innerText="Signup failed."

}

}

signupBtn.disabled=false

}

/* GOOGLE SIGNUP */

window.googleLogin = async function(){

const provider=new GoogleAuthProvider()

try{

await signInWithPopup(auth,provider)

window.location.href="dashboard.html"

}catch(error){

errorBox.innerText="Google signup failed."

}

}

</script>

</body>
</html>
