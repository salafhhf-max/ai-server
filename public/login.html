<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PromptBox AI - Login</title>

<style>

body{
margin:0;
font-family:Arial;
overflow:hidden;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:linear-gradient(270deg,#020617,#0f172a,#020617);
background-size:600% 600%;
animation:galaxy 18s infinite;
}

@keyframes galaxy{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

.container{
display:flex;
flex-direction:column;
align-items:center;
}

.eye{
width:170px;
height:110px;
background:radial-gradient(circle,#fff,#cbd5f5);
border-radius:120px/70px;
display:flex;
justify-content:center;
align-items:center;
box-shadow:0 0 60px #a855f7,inset 0 0 30px rgba(0,0,0,0.5);
position:relative;
overflow:hidden;
margin-bottom:35px;
}

.eyelid{
position:absolute;
width:100%;
height:100%;
background:#020617;
top:-100%;
transition:0.25s;
border-radius:120px/70px;
}

.iris{
width:70px;
height:70px;
border-radius:50%;
background:radial-gradient(circle,#6366f1,#1e1b4b);
display:flex;
justify-content:center;
align-items:center;
box-shadow:inset 0 0 20px black,0 0 15px rgba(0,0,0,0.7);
}

.pupil{
width:16px;
height:16px;
background:black;
border-radius:50%;
}

.reflection{
position:absolute;
width:12px;
height:12px;
background:white;
border-radius:50%;
top:20px;
left:25px;
opacity:.8;
}

.box{
width:370px;
padding:40px;
background:rgba(30,20,60,0.7);
border-radius:18px;
backdrop-filter:blur(12px);
box-shadow:0 0 50px #a855f7;
text-align:center;
}

input{
width:100%;
padding:13px;
margin-top:15px;
background:#0f0b1e;
border:1px solid #a855f7;
color:white;
border-radius:8px;
outline:none;
}

input:focus{
box-shadow:0 0 12px #a855f7;
}

button{
margin-top:20px;
width:100%;
padding:13px;
border:none;
border-radius:8px;
cursor:pointer;
font-size:16px;
background:linear-gradient(45deg,#9333ea,#a855f7);
color:white;
transition:.3s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 20px #a855f7;
}

button:disabled{
opacity:0.5;
cursor:not-allowed;
}

.google{
background:#ea4335;
}

.or{
margin:15px 0;
opacity:.6;
}

a{
color:#a855f7;
text-decoration:none;
}

.error{
margin-top:10px;
color:#f87171;
font-size:14px;
min-height:18px;
}

</style>

</head>

<body>

<canvas id="stars"></canvas>

<div class="container">

<div class="eye">

<div class="iris" id="iris">
<div class="pupil" id="pupil"></div>
</div>

<div class="reflection"></div>
<div class="eyelid" id="lid"></div>

</div>

<div class="box">

<h2>Login</h2>

<input id="email" type="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<div class="error" id="error"></div>

<button id="loginBtn" onclick="login()">Login</button>

<div class="or">or</div>

<button class="google" onclick="googleLogin()">Login with Google</button>

<p style="margin-top:15px">
Don't have account?
<a href="signup.html">Sign Up</a>
</p>

</div>

</div>

<script>

/* stars background */

const canvas=document.getElementById("stars")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let stars=[]

for(let i=0;i<250;i++){
stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*2
})
}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)
ctx.fillStyle="white"

stars.forEach(s=>{
ctx.beginPath()
ctx.arc(s.x,s.y,s.size,0,Math.PI*2)
ctx.fill()
})

requestAnimationFrame(draw)
}

draw()

</script>

<script>

/* eye tracking */

const iris=document.getElementById("iris")
const pupil=document.getElementById("pupil")
const lid=document.getElementById("lid")

let mouseX=window.innerWidth/2
let mouseY=window.innerHeight/2

let eyeX=0
let eyeY=0

let lastMove=Date.now()

function animateEye(){

let targetX=(mouseX/window.innerWidth-0.5)*60
let targetY=(mouseY/window.innerHeight-0.5)*30

eyeX+=(targetX-eyeX)*0.4
eyeY+=(targetY-eyeY)*0.4

iris.style.transform=`translate(${eyeX}px,${eyeY}px)`

requestAnimationFrame(animateEye)

}

animateEye()

setInterval(()=>{

const colors=[
"#6366f1",
"#22c55e",
"#06b6d4",
"#f43f5e",
"#f59e0b",
"#a855f7"
]

iris.style.background=`radial-gradient(circle,
${colors[Math.floor(Math.random()*colors.length)]},
#1e1b4b)`

},120)

setInterval(()=>{
pupil.style.transform=`scale(${0.8+Math.random()*0.6})`
},300)

document.addEventListener("mousemove",(e)=>{

mouseX=e.clientX
mouseY=e.clientY
lastMove=Date.now()
lid.style.top="-100%"

})

setInterval(()=>{

if(Date.now()-lastMove>2000){
lid.style.top="0%"
}else{
lid.style.top="-100%"
}

},300)

</script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getAuth,
signInWithEmailAndPassword,
GoogleAuthProvider,
signInWithPopup,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyAcvs9DevO3ezuIdlzkO_pZo1LiehaCLls",
authDomain: "promptbox-ai-6833b.firebaseapp.com",
projectId: "promptbox-ai-6833b",
storageBucket: "promptbox-ai-6833b.firebasestorage.app",
messagingSenderId: "745942779497",
appId: "1:745942779497:web:569e8a2edfaa76273904f8"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const errorBox=document.getElementById("error")
const loginBtn=document.getElementById("loginBtn")

onAuthStateChanged(auth,(user)=>{

if(user){
window.location.href="dashboard.html"
}

})

window.login = async function(){

const email=document.getElementById("email").value.trim()
const password=document.getElementById("password").value.trim()

errorBox.innerText=""

if(!email || !password){

errorBox.innerText="Please enter email and password"
return

}

loginBtn.disabled=true

try{

await signInWithEmailAndPassword(auth,email,password)

window.location.href="dashboard.html"

}catch(error){

if(error.code==="auth/user-not-found"){
errorBox.innerText="Account not found. Please sign up."

}else if(error.code==="auth/wrong-password"){
errorBox.innerText="Incorrect password."

}else if(error.code==="auth/invalid-email"){
errorBox.innerText="Invalid email."

}else if(error.code==="auth/too-many-requests"){
errorBox.innerText="Too many attempts. Try later."

}else{
errorBox.innerText="Login failed."
}

}

loginBtn.disabled=false

}

window.googleLogin = async function(){

const provider=new GoogleAuthProvider()

try{

await signInWithPopup(auth,provider)

window.location.href="dashboard.html"

}catch(error){

errorBox.innerText="Google login failed."

}

}

</script>

</body>
</html>
