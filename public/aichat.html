<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>PromptBox AI Chat</title>

<style>

body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
overflow:hidden;
}

/* stars canvas */

#stars{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* red cursor glow */

.cursor{
width:80px;
height:80px;
background:radial-gradient(circle,#ff0000,transparent 70%);
position:fixed;
pointer-events:none;
opacity:0.35;
border-radius:50%;
transform:translate(-50%,-50%);
mix-blend-mode:screen;
}

/* layout */

.container{
display:flex;
height:100vh;
}

/* sidebar */

.sidebar{

width:260px;

background:rgba(0,0,0,0.4);

backdrop-filter:blur(15px);

border-right:1px solid #222;

padding:20px;

display:flex;

flex-direction:column;

gap:15px;

}

.sidebar h2{
margin:0;
}

.newChat{

padding:10px;

background:#ff0000;

border:none;

border-radius:8px;

color:white;

cursor:pointer;

box-shadow:0 0 15px red;

}

.chatList{

flex:1;

overflow-y:auto;

}

.chatItem{

padding:10px;

background:#111;

border-radius:6px;

margin-bottom:10px;

cursor:pointer;

}

.chatItem:hover{

background:#222;

}

/* main chat */

.chatArea{

flex:1;

display:flex;

flex-direction:column;

}

/* header */

.header{

padding:20px;

background:rgba(0,0,0,0.3);

backdrop-filter:blur(10px);

border-bottom:1px solid #222;

}

/* messages */

#chat{

flex:1;

overflow-y:auto;

padding:30px;

display:flex;

flex-direction:column;

gap:20px;

}

/* bubbles */

.message{

max-width:65%;

padding:15px;

border-radius:12px;

line-height:1.6;

animation:fade .3s;

}

@keyframes fade{

from{opacity:0;transform:translateY(15px)}
to{opacity:1;transform:translateY(0)}

}

.user{

align-self:flex-end;

background:#ff0000;

box-shadow:0 0 20px red;

}

.ai{

align-self:flex-start;

background:rgba(255,255,255,0.05);

border:1px solid red;

box-shadow:0 0 20px red;

}

/* input */

.inputArea{

display:flex;

gap:10px;

padding:20px;

background:rgba(0,0,0,0.4);

backdrop-filter:blur(10px);

}

#msg{

flex:1;

padding:12px;

border-radius:10px;

border:none;

background:#020617;

color:white;

border:1px solid red;

}

button{

padding:12px 20px;

background:red;

border:none;

color:white;

border-radius:10px;

cursor:pointer;

box-shadow:0 0 15px red;

transition:0.3s;

}

button:hover{

transform:scale(1.05);

box-shadow:0 0 30px red;

}

/* planets */

.planet{

position:fixed;

border-radius:50%;

background:radial-gradient(circle,#ff0000,#020617);

box-shadow:0 0 40px red;

animation:float 12s infinite ease-in-out;

}

.planet1{

width:120px;

height:120px;

top:15%;

left:5%;

}

.planet2{

width:80px;

height:80px;

bottom:20%;

right:8%;

animation-delay:4s;

}

@keyframes float{

0%{transform:translateY(0)}
50%{transform:translateY(-40px)}
100%{transform:translateY(0)}

}

/* loading */

.loading{

display:flex;

gap:6px;

}

.dot{

width:8px;

height:8px;

background:red;

border-radius:50%;

animation:blink 1.4s infinite;

}

@keyframes blink{

0%{opacity:.2}
50%{opacity:1}
100%{opacity:.2}

}

</style>

</head>

<body>

<canvas id="stars"></canvas>

<div class="planet planet1"></div>
<div class="planet planet2"></div>

<div class="cursor" id="cursor"></div>

<div class="container">

<div class="sidebar">

<h2>Chats</h2>

<button class="newChat" onclick="newChat()">New Chat</button>

<div class="chatList" id="chatList"></div>

</div>

<div class="chatArea">

<div class="header">

PromptBox AI Chat

</div>

<div id="chat"></div>

<div class="inputArea">

<input id="msg" placeholder="Ask AI anything...">

<button onclick="send()">Send</button>

</div>

</div>

</div>

<script>

/* cursor red glow */

const cursor=document.getElementById("cursor")

document.addEventListener("mousemove",e=>{

cursor.style.left=e.clientX+"px"

cursor.style.top=e.clientY+"px"

})

/* stars */

const canvas=document.getElementById("stars")

const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let stars=[]

for(let i=0;i<250;i++){

stars.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2

})

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="white"

stars.forEach(s=>{

ctx.beginPath()

ctx.arc(s.x,s.y,s.r,0,Math.PI*2)

ctx.fill()

s.y+=0.3

if(s.y>canvas.height) s.y=0

})

requestAnimationFrame(draw)

}

draw()

/* chat */

let chat=document.getElementById("chat")

function addMessage(text,type){

let div=document.createElement("div")

div.className="message "+type

div.innerText=text

chat.appendChild(div)

chat.scrollTop=chat.scrollHeight

}

/* loading */

function showLoading(){

let loading=document.createElement("div")

loading.className="message ai loading"

loading.id="loading"

loading.innerHTML='<div class="dot"></div><div class="dot"></div><div class="dot"></div>'

chat.appendChild(loading)

chat.scrollTop=chat.scrollHeight

}

/* send */

async function send(){

let input=document.getElementById("msg")

let msg=input.value.trim()

if(!msg) return

addMessage(msg,"user")

input.value=""

showLoading()

let res=await fetch("/ai",{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({

text:msg,
type:"chat"

})

})

let data=await res.json()

document.getElementById("loading").remove()

addMessage(data.result,"ai")

}

/* enter send */

document.getElementById("msg").addEventListener("keypress",e=>{

if(e.key==="Enter") send()

})

/* chats sidebar */

function newChat(){

chat.innerHTML=""

let item=document.createElement("div")

item.className="chatItem"

item.innerText="Chat "+(document.querySelectorAll(".chatItem").length+1)

document.getElementById("chatList").appendChild(item)

}

</script>

</body>
</html>
