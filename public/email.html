<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>AI Email Writer</title>

<style>

body{
margin:0;
font-family:Arial;
color:white;
overflow-x:hidden;

background:linear-gradient(270deg,#02140f,#052e2b,#02140f);
background-size:600% 600%;
animation:bgmove 12s infinite;
}

@keyframes bgmove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* stars */

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* sidebar */

.sidebar{
position:fixed;
left:0;
top:0;
height:100%;
width:210px;
background:#02140f;
box-shadow:0 0 25px #22c55e;
padding-top:40px;
}

.sidebar a{
display:block;
padding:15px;
color:white;
text-decoration:none;
border-bottom:1px solid #111;
transition:0.3s;
}

.sidebar a:hover{
background:#22c55e;
padding-left:25px;
}

/* main */

.main{
margin-left:210px;
text-align:center;
}

/* container */

.container{

width:700px;
margin:auto;
margin-top:60px;

background:rgba(255,255,255,0.05);
backdrop-filter:blur(12px);

border-radius:14px;

padding:35px;

box-shadow:0 0 35px rgba(34,197,94,0.4);

}

/* title */

.title{
font-size:32px;
margin-bottom:20px;
background:linear-gradient(90deg,#22c55e,#4ade80);
-webkit-background-clip:text;
color:transparent;
}

/* textarea */

textarea{
width:100%;
height:140px;
background:#02140f;
border:1px solid #22c55e;
color:white;
padding:12px;
border-radius:6px;
box-shadow:0 0 15px #22c55e;
}

/* select */

select{
margin-top:10px;
padding:8px;
background:#02140f;
border:1px solid #22c55e;
color:white;
}

/* buttons */

button{

margin-top:18px;
padding:12px 25px;

background:#22c55e;
border:none;

color:white;

cursor:pointer;

border-radius:6px;

box-shadow:0 0 10px #22c55e,0 0 30px #22c55e;

transition:0.3s;

}

button:hover{

transform:scale(1.05);

box-shadow:0 0 20px #22c55e,0 0 60px #22c55e;

}

/* result */

.result{

margin-top:25px;

background:#02140f;

border:1px solid #22c55e;

padding:20px;

border-radius:10px;

text-align:left;

white-space:pre-wrap;

min-height:120px;

}

/* loading */

.loading{
display:none;
margin-top:15px;
}

.dot{
height:8px;
width:8px;
margin:4px;
background:#22c55e;
border-radius:50%;
display:inline-block;
animation:blink 1.4s infinite;
}

@keyframes blink{
0%{opacity:0.2;}
50%{opacity:1;}
100%{opacity:0.2;}
}

/* extra buttons */

.tools{
margin-top:15px;
}

.tools button{
margin:6px;
}

/* word counter */

.counter{
margin-top:10px;
opacity:0.7;
}

</style>

</head>

<body>

<canvas id="stars"></canvas>

<div class="sidebar">

<a href="dashboard.html">Dashboard</a>
<a href="resume.html">Resume</a>
<a href="email.html">Email</a>
<a href="summary.html">Summary</a>
<a href="translate.html">Translate</a>

</div>

<div class="main">

<div class="container">

<div class="title">AI Email Writer</div>

<textarea id="input" placeholder="Example: Write a professional email asking for a job interview"></textarea>

<br>

<select id="tone">
<option value="professional">Professional</option>
<option value="friendly">Friendly</option>
<option value="formal">Formal</option>
<option value="support">Customer Support</option>
</select>

<select id="length">
<option value="short">Short</option>
<option value="medium">Medium</option>
<option value="long">Long</option>
</select>

<br>

<button onclick="generate()">
Generate Email
</button>

<div class="loading" id="loading">

<span class="dot"></span>
<span class="dot"></span>
<span class="dot"></span>

</div>

<div id="result" class="result"></div>

<div class="counter">
Words: <span id="words">0</span>
</div>

<div class="tools">

<button onclick="copyText()">Copy</button>

<button onclick="downloadEmail()">Download</button>

<button onclick="speak()">Read</button>

</div>

</div>

</div>

<script>

/* stars */

const canvas=document.getElementById("stars")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let stars=[]

for(let i=0;i<200;i++){

stars.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*2

})

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="white"

stars.forEach(s=>{

ctx.beginPath()
ctx.arc(s.x,s.y,s.size,0,Math.PI*2)
ctx.fill()

})

requestAnimationFrame(draw)

}

draw()

/* generate */

async function generate(){

const text=document.getElementById("input").value
const tone=document.getElementById("tone").value
const length=document.getElementById("length").value

document.getElementById("loading").style.display="block"

const res=await fetch("/ai",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
text:text,
type:"email",
tone:tone,
length:length
})

})

const data=await res.json()

document.getElementById("loading").style.display="none"

typeEffect(data.result)

}

/* typing effect */

function typeEffect(text){

let i=0

const el=document.getElementById("result")

el.innerHTML=""

function typing(){

if(i<text.length){

el.innerHTML+=text.charAt(i)

i++

updateWords()

setTimeout(typing,15)

}

}

typing()

}

/* word counter */

function updateWords(){

const words=document.getElementById("result").innerText.split(/\s+/).length

document.getElementById("words").innerText=words

}

/* copy */

function copyText(){

const text=document.getElementById("result").innerText

navigator.clipboard.writeText(text)

alert("Copied!")

}

/* download */

function downloadEmail(){

const text=document.getElementById("result").innerText

const blob=new Blob([text],{type:"text/plain"})

const a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="email.txt"

a.click()

}

/* text to speech */

function speak(){

const text=document.getElementById("result").innerText

const speech=new SpeechSynthesisUtterance(text)

speech.lang="en-US"

speechSynthesis.speak(speech)

}

</script>

</body>
</html>
