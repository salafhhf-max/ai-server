<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>AI Text Summarizer</title>

<style>

body{
margin:0;
font-family:Arial;
color:white;
overflow-x:hidden;

background:linear-gradient(270deg,#1a0b2e,#2a0f4f,#1a0b2e);
background-size:600% 600%;
animation:bgmove 12s infinite;
}

@keyframes bgmove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* stars */

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* sidebar */

.sidebar{
position:fixed;
left:0;
top:0;
height:100%;
width:210px;
background:#140826;
box-shadow:0 0 25px #a855f7;
padding-top:40px;
}

.sidebar a{
display:block;
padding:15px;
color:white;
text-decoration:none;
border-bottom:1px solid #111;
transition:0.3s;
}

.sidebar a:hover{
background:#a855f7;
padding-left:25px;
}

/* main */

.main{
margin-left:210px;
text-align:center;
}

/* container */

.container{

width:700px;
margin:auto;
margin-top:60px;

background:rgba(255,255,255,0.05);
backdrop-filter:blur(12px);

border-radius:14px;

padding:35px;

box-shadow:0 0 35px rgba(168,85,247,0.4);

}

/* title */

.title{
font-size:32px;
margin-bottom:20px;
background:linear-gradient(90deg,#a855f7,#c084fc);
-webkit-background-clip:text;
color:transparent;
}

/* textarea */

textarea{
width:100%;
height:170px;
background:#140826;
border:1px solid #a855f7;
color:white;
padding:12px;
border-radius:6px;
box-shadow:0 0 15px #a855f7;
}

/* select */

select{
margin-top:12px;
padding:8px;
background:#140826;
color:white;
border:1px solid #a855f7;
}

/* button */

button{

margin-top:18px;
padding:12px 25px;

background:#a855f7;
border:none;

color:white;

cursor:pointer;

border-radius:6px;

box-shadow:0 0 10px #a855f7,0 0 30px #a855f7;

transition:0.3s;

}

button:hover{

transform:scale(1.05);

box-shadow:0 0 20px #a855f7,0 0 60px #a855f7;

}

/* result */

.result{

margin-top:25px;

background:#140826;

border:1px solid #a855f7;

padding:20px;

border-radius:10px;

text-align:left;

white-space:pre-wrap;

min-height:120px;

}

/* loading */

.loading{
display:none;
margin-top:15px;
}

.dot{
height:8px;
width:8px;
margin:4px;
background:#a855f7;
border-radius:50%;
display:inline-block;
animation:blink 1.4s infinite;
}

@keyframes blink{
0%{opacity:0.2;}
50%{opacity:1;}
100%{opacity:0.2;}
}

/* counter */

.counter{
margin-top:10px;
color:#c084fc;
}

/* tools */

.tools{
margin-top:15px;
}

.tools button{
margin:6px;
}

</style>

</head>

<body>

<canvas id="stars"></canvas>

<div class="sidebar">

<a href="dashboard.html">Dashboard</a>
<a href="resume.html">Resume</a>
<a href="email.html">Email</a>
<a href="summary.html">Summary</a>
<a href="translate.html">Translate</a>

</div>

<div class="main">

<div class="container">

<div class="title">AI Text Summarizer</div>

<textarea id="input" placeholder="Paste your text here..." oninput="countWords()"></textarea>

<div class="counter" id="counter">
Words: 0
</div>

<br>

<select id="length">

<option value="short">Short Summary</option>
<option value="medium">Medium Summary</option>
<option value="long">Detailed Summary</option>

</select>

<select id="style">

<option value="paragraph">Paragraph</option>
<option value="bullets">Bullet Points</option>
<option value="tldr">TL;DR</option>
<option value="keyideas">Key Ideas</option>

</select>

<br>

<button onclick="generate()">
Summarize
</button>

<div class="loading" id="loading">

<span class="dot"></span>
<span class="dot"></span>
<span class="dot"></span>

</div>

<div id="result" class="result"></div>

<div class="tools">

<button onclick="copyText()">Copy</button>

<button onclick="downloadSummary()">Download</button>

<button onclick="speak()">Read</button>

</div>

</div>

</div>

<script>

/* stars */

const canvas=document.getElementById("stars")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let stars=[]

for(let i=0;i<200;i++){

stars.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*2

})

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="white"

stars.forEach(s=>{

ctx.beginPath()
ctx.arc(s.x,s.y,s.size,0,Math.PI*2)
ctx.fill()

})

requestAnimationFrame(draw)

}

draw()

/* word counter */

function countWords(){

const text=document.getElementById("input").value

const words=text.trim().split(/\s+/).filter(w=>w.length>0)

document.getElementById("counter").innerText="Words: "+words.length

}

/* generate */

async function generate(){

const text=document.getElementById("input").value
const length=document.getElementById("length").value
const style=document.getElementById("style").value

document.getElementById("loading").style.display="block"

const res=await fetch("/ai",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
text:text+" | summary length:"+length+" | style:"+style,
type:"summary"
})

})

const data=await res.json()

document.getElementById("loading").style.display="none"

typeEffect(data.result)

}

/* typing */

function typeEffect(text){

let i=0

const el=document.getElementById("result")

el.innerHTML=""

function typing(){

if(i<text.length){

el.innerHTML+=text.charAt(i)

i++

setTimeout(typing,15)

}

}

typing()

}

/* copy */

function copyText(){

const text=document.getElementById("result").innerText

navigator.clipboard.writeText(text)

alert("Copied!")

}

/* download */

function downloadSummary(){

const text=document.getElementById("result").innerText

const blob=new Blob([text],{type:"text/plain"})

const a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="summary.txt"

a.click()

}

/* speech */

function speak(){

const text=document.getElementById("result").innerText

const speech=new SpeechSynthesisUtterance(text)

speech.lang="en-US"

speechSynthesis.speak(speech)

}

</script>

</body>
</html>
